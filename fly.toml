app = "dicomvision-server-l5769389"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  APP_HOST = "0.0.0.0"
  APP_PORT = "8000"
  CORS_ORIGINS = "[\"*\"]"
  LOG_LEVEL = "INFO"
  WEB_SAMPLE_DICOM_PATH = "/app/sample-data/test"

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 40

[checks]
  [checks.health]
    port = 8000
    type = "http"
    method = "get"
    path = "/health"
    interval = "15s"
    timeout = "10s"
    grace_period = "45s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "2gb"
