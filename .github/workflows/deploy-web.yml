name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout client
        uses: actions/checkout@v4
        with:
          repository: l5769389/DicomVisionClient
          ref: main
          path: DicomVisionClient

      - name: Checkout server
        uses: actions/checkout@v4
        with:
          path: DicomVisionServer

      - name: Deploy on server
        env:
          DEPLOY_HOST: ${{ secrets.JDCLOUD_DEPLOY_HOST || '111.228.1.213' }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'root' }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KEY_B64: ${{ secrets.DEPLOY_SSH_KEY_B64 }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          PUBLIC_ORIGIN: ${{ secrets.JDCLOUD_PUBLIC_ORIGIN || 'http://111.228.1.213' }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "${DEPLOY_SSH_KEY:-}${DEPLOY_SSH_KEY_B64:-}"

          CLIENT_ARCHIVE="/tmp/DicomVisionClient-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.tar.gz"
          SERVER_ARCHIVE="/tmp/DicomVisionServer-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.tar.gz"

          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='dist-*' \
            -czf "$CLIENT_ARCHIVE" -C DicomVisionClient .
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            -czf "$SERVER_ARCHIVE" -C DicomVisionServer .

          install -m 700 -d ~/.ssh
          if [ -n "${DEPLOY_SSH_KEY_B64:-}" ]; then
            printf '%s' "$DEPLOY_SSH_KEY_B64" | base64 -d > ~/.ssh/deploy_key
          else
            printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          fi
          tr -d '\r' < ~/.ssh/deploy_key > ~/.ssh/deploy_key.tmp
          mv ~/.ssh/deploy_key.tmp ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

          SSH_OPTS=(-o StrictHostKeyChecking=accept-new -o ServerAliveInterval=30 -o ServerAliveCountMax=10 -i ~/.ssh/deploy_key)

          scp "${SSH_OPTS[@]}" "$CLIENT_ARCHIVE" "$SERVER_ARCHIVE" "$DEPLOY_USER@$DEPLOY_HOST:/tmp/"

          ssh "${SSH_OPTS[@]}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "APP_DIR='${DEPLOY_PATH:-/opt/dicomvision}' PUBLIC_ORIGIN='${PUBLIC_ORIGIN:-http://$DEPLOY_HOST}' CLIENT_ARCHIVE='$CLIENT_ARCHIVE' SERVER_ARCHIVE='$SERVER_ARCHIVE' bash -s" <<'EOF'
          set -euo pipefail
          exec 8>/var/lock/dicomvision-upload.lock
          flock 8
          ts="$(date +%Y%m%d%H%M%S)"
          mkdir -p "$APP_DIR"
          rm -rf "$APP_DIR/DicomVisionClient.next" "$APP_DIR/DicomVisionServer.next"
          mkdir -p "$APP_DIR/DicomVisionClient.next" "$APP_DIR/DicomVisionServer.next"
          tar -xzf "$CLIENT_ARCHIVE" -C "$APP_DIR/DicomVisionClient.next"
          tar -xzf "$SERVER_ARCHIVE" -C "$APP_DIR/DicomVisionServer.next"
          if [ -e "$APP_DIR/DicomVisionClient" ]; then
            rm -rf "$APP_DIR/DicomVisionClient.previous"
            mv "$APP_DIR/DicomVisionClient" "$APP_DIR/DicomVisionClient.previous"
          fi
          if [ -e "$APP_DIR/DicomVisionServer" ]; then
            rm -rf "$APP_DIR/DicomVisionServer.previous"
            mv "$APP_DIR/DicomVisionServer" "$APP_DIR/DicomVisionServer.previous"
          fi
          mv "$APP_DIR/DicomVisionClient.next" "$APP_DIR/DicomVisionClient"
          mv "$APP_DIR/DicomVisionServer.next" "$APP_DIR/DicomVisionServer"
          SKIP_GIT_SYNC=1 bash "$APP_DIR/DicomVisionClient/deploy/start-deploy.sh"
          rm -f "$CLIENT_ARCHIVE" "$SERVER_ARCHIVE"
          echo "Uploaded source deploy started at $ts"
          EOF
